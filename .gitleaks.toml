# gitleaks configuration (extends the bundled default ruleset).
# Format reference: https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

[[allowlists]]
description = "Tests use synthetic UUIDs (seed case IDs, idempotency keys, fixture salts); they are not real credentials."
paths = [
  '''apps/worker/tests/.*\.test\.ts''',
  '''apps/worker/tests/fixtures/.*''',
  '''packages/eval/.*\.eval\.ts''',
]

[[allowlists]]
description = "Phase 4 community-vouching seed-case UUIDs (cases 006-008)."
regexes = [
  '''11111111-1111-4111-8111-1111111111\d{2}''',
]
