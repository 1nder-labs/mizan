name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets (gitleaks)
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl --silent --show-error --location --fail \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --verbose --exit-code 1

  verify:
    name: Verify (lint · types · tests · knip)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies (frozen lockfile · Socket scanner active)
        run: bun install --frozen-lockfile --no-cache

      - name: Audit dependencies for HIGH/CRITICAL CVEs
        run: bun run audit

      - name: Lint TypeScript sources (oxlint)
        run: bun run lint

      - name: Check formatting (oxfmt)
        run: bun run format:check

      - name: Typecheck per workspace (tsc --noEmit)
        run: bun run typecheck

      - name: Detect dead code (knip)
        run: bun run knip

      - name: Enforce UI state-map policy (PRD §7.7.5)
        run: |
          set -euo pipefail
          if grep -rE "from ['\"]zustand['\"]|import \{ create \} from ['\"]zustand['\"]" apps/web/src 2>/dev/null; then
            echo "ci: zustand import detected in apps/web/src — PRD §7.7.5 forbids global stores"
            exit 1
          fi
          if grep -rE "(^|[^a-zA-Z_.])fetch\(" apps/web/src --exclude-dir=tests 2>/dev/null | grep -v "src/lib/rpc.ts"; then
            echo "ci: direct fetch() call detected outside apps/web/src/lib/rpc.ts"
            exit 1
          fi

      - name: Enforce telemetry chokepoint on workflow steps (Phase 8)
        run: |
          set -euo pipefail
          # 1. runStructuredLlm must contain experimental_telemetry (the single chokepoint)
          if ! grep -q "experimental_telemetry" packages/mastra/src/steps/shared/runStructuredLlm.ts; then
            echo "ci: runStructuredLlm.ts missing experimental_telemetry — telemetry chokepoint broken"
            exit 1
          fi
          # 2. No step file may call generateText/streamText/generateObject directly (call-form match)
          direct_calls=$(grep -rnE '(generateText|streamText|generateObject)\(' \
            packages/mastra/src/steps/ \
            --include='*.ts' \
            | grep -v 'runStructuredLlm.ts' \
            | grep -v '\.test\.' \
            || true)
          if [ -n "$direct_calls" ]; then
            echo "ci: direct LLM call detected outside the telemetry chokepoint:"
            echo "$direct_calls"
            exit 1
          fi

      - name: Enforce light worker entry graph (boot-weight gate)
        run: bun scripts/check-worker-entry-graph.ts

      - name: Run web integration tests (vitest + MSW + RTL)
        run: bun --filter @mizan/web test:integration

      - name: Run unit tests (bun test)
        run: bun --filter '*' test -- --reporter=junit --reporter-outfile=test-results.junit.xml

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: "**/test-results*.junit.xml"
          retention-days: 14

      - name: Append summary to job report
        if: always()
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- Workflow: ${{ github.workflow }}"
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Runner: ubuntu-latest"
          } >> "$GITHUB_STEP_SUMMARY"

  # Worker integration runs on workerd (vitest-pool-workers + Miniflare) with
  # REAL local D1/R2/KV/Queue bindings and mock LLM providers — fully hermetic,
  # no secrets. This became CI-viable when the worker's static entry graph was
  # made Mastra/AI-SDK-free (see scripts/check-worker-entry-graph.ts): workerd
  # now boots in seconds per file instead of ~30s, and only the handful of
  # files that exercise the brief/chat workflows evaluate the heavy graph.
  # Sharded 2-way because the default runner's RAM caps the pool at low
  # parallelism; shards halve the wall-clock.
  worker-integration:
    name: Worker integration (workerd ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/2", "2/2"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies (frozen lockfile · Socket scanner active)
        run: bun install --frozen-lockfile --no-cache

      - name: Run worker integration tests (shard ${{ matrix.shard }})
        working-directory: apps/worker
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: bun x vitest run --project integration --shard=${{ matrix.shard }}

  # Production deploy is handled by Cloudflare's native GitHub integration
  # (Workers Builds), configured in the Cloudflare dashboard — it watches the
  # deploy branch and runs the build + `wrangler deploy` itself, so CI here owns
  # only correctness gates (secret-scan · verify · worker-integration). The
  # Worker's runtime secrets (OPENAI_API_KEY, BETTER_AUTH_SECRET, LANGFUSE_*,
  # REVIEW_ORG_ID) are set once directly on the Worker and persist across
  # deploys; no app credentials live in GitHub.
