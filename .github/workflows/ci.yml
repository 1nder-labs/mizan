name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan (gitleaks OSS binary)
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl --silent --show-error --location --fail \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --verbose --exit-code 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install (frozen, no cache, scanner active)
        run: bun install --frozen-lockfile --no-cache

      - name: Audit (HIGH/CRITICAL gate)
        run: bun run audit

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (oxfmt)
        run: bun run format:check

      - name: Typecheck (tsc --noEmit per workspace)
        run: bun run typecheck

      - name: Dead-code check (knip)
        run: bun run knip

      - name: Test (unit — fast, no workerd)
        run: bun --filter '*' test -- --reporter=junit --reporter-outfile=test-results.junit.xml

      # Integration tests are run LOCALLY via `bun --filter @mizan/worker test:integration`.
      # Not in CI: cloudflare-vitest-pool-workers spins one workerd per test
      # file + recompiles the full Mastra + Langfuse + AI SDK graph each boot,
      # adding ~13 min for 5 files with no caching benefit. Re-enable once
      # the pool supports cross-file workerd reuse or we move to a faster
      # local-runtime test harness.

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results*.junit.xml"
          retention-days: 14
