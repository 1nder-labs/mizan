name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets (gitleaks)
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl --silent --show-error --location --fail \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --verbose --exit-code 1

  verify:
    name: Verify (lint · types · tests · knip)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies (frozen lockfile · Socket scanner active)
        run: bun install --frozen-lockfile --no-cache

      - name: Audit dependencies for HIGH/CRITICAL CVEs
        run: bun run audit

      - name: Lint TypeScript sources (oxlint)
        run: bun run lint

      - name: Check formatting (oxfmt)
        run: bun run format:check

      - name: Typecheck per workspace (tsc --noEmit)
        run: bun run typecheck

      - name: Detect dead code (knip)
        run: bun run knip

      - name: Enforce UI state-map policy (PRD §7.7.5)
        run: |
          set -euo pipefail
          if grep -rE "from ['\"]zustand['\"]|import \{ create \} from ['\"]zustand['\"]" apps/web/src 2>/dev/null; then
            echo "ci: zustand import detected in apps/web/src — PRD §7.7.5 forbids global stores"
            exit 1
          fi
          if grep -rE "(^|[^a-zA-Z_.])fetch\(" apps/web/src --exclude-dir=tests 2>/dev/null | grep -v "src/lib/rpc.ts"; then
            echo "ci: direct fetch() call detected outside apps/web/src/lib/rpc.ts"
            exit 1
          fi

      - name: Enforce telemetry chokepoint on workflow steps (Phase 8)
        run: |
          set -euo pipefail
          # 1. runStructuredLlm must contain experimental_telemetry (the single chokepoint)
          if ! grep -q "experimental_telemetry" packages/mastra/src/steps/shared/runStructuredLlm.ts; then
            echo "ci: runStructuredLlm.ts missing experimental_telemetry — telemetry chokepoint broken"
            exit 1
          fi
          # 2. No step file may call generateText/streamText/generateObject directly (call-form match)
          direct_calls=$(grep -rnE '(generateText|streamText|generateObject)\(' \
            packages/mastra/src/steps/ \
            --include='*.ts' \
            | grep -v 'runStructuredLlm.ts' \
            | grep -v '\.test\.' \
            || true)
          if [ -n "$direct_calls" ]; then
            echo "ci: direct LLM call detected outside the telemetry chokepoint:"
            echo "$direct_calls"
            exit 1
          fi

      - name: Run web integration tests (vitest + MSW + RTL)
        run: bun --filter @mizan/web test:integration

      - name: Run unit tests (bun test)
        run: bun --filter '*' test -- --reporter=junit --reporter-outfile=test-results.junit.xml

      # ────────────────────────────────────────────────────────────────────
      # STRICT RULE — vitest-pool-workers integration tests are LOCAL-ONLY.
      # Never add `bun --filter @mizan/worker test:integration` (or any
      # `vitest-pool-workers`-backed task) to this workflow. The pool has a
      # fixed ~10s/file workerd cold-start that pushes any meaningful
      # surface past a 2-min CI budget. The patched xxhash-wasm export
      # condition (see `patches/`) makes the suite runnable locally; that
      # is the support contract. Reviewers run
      #   bun --filter @mizan/worker test:integration
      # locally for D1/route-touching PRs.
      # ────────────────────────────────────────────────────────────────────

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: "**/test-results*.junit.xml"
          retention-days: 14

      - name: Append summary to job report
        if: always()
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- Workflow: ${{ github.workflow }}"
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Runner: ubuntu-latest"
            echo ""
            echo "Worker integration tests (vitest-pool-workers + Miniflare) are LOCAL-ONLY."
            echo "Run with: \`bun --filter @mizan/worker test:integration\`."
            echo "Adding them to this workflow is forbidden — see the strict-rule comment in ci.yml."
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────
  # STRICT RULE for future phases:
  #
  # Do NOT add any job, step, or workflow that runs
  # `vitest-pool-workers` / `@cloudflare/vitest-pool-workers` against the
  # worker integration suite. The pool's per-file workerd cold-start
  # (~10s) makes the full suite breach a 2-min budget no matter how
  # the tests themselves are written. The decision is documented at:
  #   - this file (search "STRICT RULE")
  #   - apps/worker/package.json (only `test:integration` exists — no
  #     `:ci` variant is permitted)
  #   - patches/xxhash-wasm@1.1.0.patch (the patch exists so the local
  #     suite is runnable; CI relevance is intentionally none)
  #
  # Local-only is the support contract. PRs that change D1, routes, or
  # workflow steps include a "ran integration locally" note in the PR
  # body. Future phases that want CI coverage of those surfaces must
  # write Bun-test-runnable unit tests against the helpers, not
  # vitest-pool-workers integration tests.
  # ────────────────────────────────────────────────────────────────────────
