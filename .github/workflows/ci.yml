name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets (gitleaks)
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl --silent --show-error --location --fail \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --verbose --exit-code 1

  verify:
    name: Verify (lint · types · tests · knip)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies (frozen lockfile · Socket scanner active)
        run: bun install --frozen-lockfile --no-cache

      - name: Audit dependencies for HIGH/CRITICAL CVEs
        run: bun run audit

      - name: Lint TypeScript sources (oxlint)
        run: bun run lint

      - name: Check formatting (oxfmt)
        run: bun run format:check

      - name: Typecheck per workspace (tsc --noEmit)
        run: bun run typecheck

      - name: Detect dead code (knip)
        run: bun run knip

      - name: Run unit tests (bun test)
        run: bun --filter '*' test -- --reporter=junit --reporter-outfile=test-results.junit.xml

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: "**/test-results*.junit.xml"
          retention-days: 14

      - name: Append summary to job report
        if: always()
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- Workflow: ${{ github.workflow }}"
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Runner: ubuntu-latest"
            echo ""
            echo "Unit tests above; integration suite runs in the parallel \`verify-integration\` job."
          } >> "$GITHUB_STEP_SUMMARY"

  verify-integration:
    name: Verify integration (Miniflare + @cloudflare/vitest-pool-workers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: secret-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies (frozen lockfile · Socket scanner active)
        run: bun install --frozen-lockfile --no-cache

      - name: Run integration tests (vitest + Miniflare)
        run: bun --filter @mizan/worker test:integration

      - name: Upload integration test artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-failure-logs
          path: |
            apps/worker/**/*.log
            apps/worker/**/test-results*.junit.xml
          retention-days: 7
