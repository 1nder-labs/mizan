name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install (frozen, no cache, scanner active)
        run: bun install --frozen-lockfile --no-cache

      - name: Audit (HIGH/CRITICAL gate)
        run: bun run audit

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (oxfmt)
        run: bun run format:check

      - name: Typecheck (tsc --noEmit per workspace)
        run: bun run typecheck

      - name: Dead-code check (knip)
        run: bun run knip

      - name: Test (vitest + miniflare)
        run: bun --filter '*' test -- --reporter=junit --outputFile=test-results.junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.junit.xml"
          retention-days: 14
