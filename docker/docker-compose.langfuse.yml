# DEV-ONLY — hardcoded credentials for local observability only.
# NEVER copy these values to any production environment.
# The Mizan worker does not ship LANGFUSE_HOST to production until Phase 8,
# at which point real credentials are injected via `wrangler secret put`.
name: mizan-langfuse

services:
  langfuse-db:
    image: postgres:16-alpine
    container_name: mizan-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2.95.11
    container_name: mizan-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3010:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/postgres
      NEXTAUTH_SECRET: dev-secret-not-for-production
      SALT: dev-salt-not-for-production
      NEXTAUTH_URL: http://localhost:3010
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/public/health"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s

volumes:
  langfuse_db_data: {}
